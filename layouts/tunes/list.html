{{- define "main" }}

<div class="tunes-page">
  <header class="page-header">
    <h1 class="page-title">Tunes</h1>
    <p class="page-desc">A few things I've been playing.</p>
  </header>

  <!-- Sticky Player -->
  <div class="audio-player" id="audio-player">
    <div class="player-info">
      <span class="player-title" id="player-title">Select a track to play</span>
      <span class="player-artist" id="player-artist"></span>
    </div>
    <div class="player-controls">
      <button class="play-btn" id="play-btn" disabled aria-label="Play">
        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <div class="progress-container">
        <span class="time-label" id="current-time">0:00</span>
        <input type="range" class="progress-bar" id="progress-bar" value="0" min="0" max="100" step="0.1">
        <span class="time-label" id="duration">0:00</span>
      </div>

      <div class="volume-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" class="volume-slider" id="volume-slider" value="100" min="0" max="100">
      </div>
    </div>
  </div>

  <!-- Track List -->
  <ul class="track-list">
    {{- range site.Data.tunes }}
    <li class="track-item" data-src="{{ .file }}" data-title="{{ .title }}" data-artist="{{ .artist | default "" }}">
      <div class="track-play-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
      <div class="track-info">
        <span class="track-title">{{ .title }}</span>
        {{- if .artist }}<span class="track-artist">{{ .artist }}</span>{{ end }}
      </div>
    </li>
    {{- end }}
  </ul>
</div>

<audio id="audio-element" preload="metadata"></audio>

<style>
.tunes-page {
  max-width: 680px;
  margin: 0 auto;
}

.page-desc {
  color: var(--secondary);
  margin-top: -8px;
  margin-bottom: 32px;
  font-size: 15px;
}

/* Player */
.audio-player {
  background: var(--entry);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 28px;
}

.player-info {
  display: flex;
  flex-direction: column;
  margin-bottom: 14px;
}

.player-title {
  font-weight: var(--semibold);
  font-size: 15px;
  color: var(--primary);
}

.player-artist {
  font-size: 13px;
  color: var(--secondary);
  margin-top: 2px;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.play-btn {
  background: var(--darkcolor);
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #fff;
  flex-shrink: 0;
  transition: opacity 0.15s;
}

.play-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.play-btn:not(:disabled):hover {
  opacity: 0.85;
}

.progress-container {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.time-label {
  font-size: 12px;
  color: var(--secondary);
  white-space: nowrap;
  min-width: 32px;
}

.progress-bar,
.volume-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 2px;
  background: var(--tertiary);
  outline: none;
  cursor: pointer;
}

.progress-bar {
  flex: 1;
}

.progress-bar::-webkit-slider-thumb,
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--darkcolor);
  cursor: pointer;
}

.volume-container {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--secondary);
  flex-shrink: 0;
}

.volume-slider {
  width: 72px;
}

/* Track List */
.track-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.track-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
}

.track-item:hover {
  background: var(--entry);
  border-color: var(--border);
}

.track-item.active {
  background: var(--entry);
  border-color: var(--darkcolor);
}

.track-play-icon {
  color: var(--secondary);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  transition: color 0.1s;
}

.track-item.active .track-play-icon,
.track-item:hover .track-play-icon {
  color: var(--darkcolor);
}

.track-info {
  display: flex;
  flex-direction: column;
}

.track-title {
  font-size: 15px;
  color: var(--primary);
  font-weight: var(--semibold);
}

.track-artist {
  font-size: 13px;
  color: var(--secondary);
  margin-top: 2px;
}
</style>

<script>
(function () {
  const audio = document.getElementById('audio-element');
  const playBtn = document.getElementById('play-btn');
  const iconPlay = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');
  const progressBar = document.getElementById('progress-bar');
  const volumeSlider = document.getElementById('volume-slider');
  const currentTimeEl = document.getElementById('current-time');
  const durationEl = document.getElementById('duration');
  const playerTitle = document.getElementById('player-title');
  const playerArtist = document.getElementById('player-artist');
  const tracks = document.querySelectorAll('.track-item');

  let activeTrack = null;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function loadTrack(item) {
    if (activeTrack) activeTrack.classList.remove('active');
    activeTrack = item;
    item.classList.add('active');

    audio.src = item.dataset.src;
    playerTitle.textContent = item.dataset.title;
    playerArtist.textContent = item.dataset.artist || '';
    playBtn.disabled = false;
    audio.play();
    setPlaying(true);
  }

  function setPlaying(playing) {
    iconPlay.style.display = playing ? 'none' : '';
    iconPause.style.display = playing ? '' : 'none';
  }

  playBtn.addEventListener('click', () => {
    if (audio.paused) {
      audio.play();
      setPlaying(true);
    } else {
      audio.pause();
      setPlaying(false);
    }
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progressBar.value = (audio.currentTime / audio.duration) * 100;
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    durationEl.textContent = fmt(audio.duration);
  });

  audio.addEventListener('ended', () => {
    setPlaying(false);
    progressBar.value = 0;
    currentTimeEl.textContent = '0:00';
  });

  progressBar.addEventListener('input', () => {
    if (audio.duration) {
      audio.currentTime = (progressBar.value / 100) * audio.duration;
    }
  });

  volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value / 100;
  });

  tracks.forEach(item => {
    item.addEventListener('click', () => {
      if (activeTrack === item) {
        if (audio.paused) { audio.play(); setPlaying(true); }
        else { audio.pause(); setPlaying(false); }
      } else {
        loadTrack(item);
      }
    });
  });
})();
</script>

{{- end }}
