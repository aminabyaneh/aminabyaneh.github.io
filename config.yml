          enabled: true
          title: Amin Abyaneh
          subtitle: "PhD candidate in AI and Robotics at McGill and Mila. My research spans policy learning, through imitation, reinforcement learning, and diffusion-based methods, and world modeling, building internal representations of how environments evolve over time using autoregressive and diffusion models. I care about grounding these in the mathematics of dynamical systems to bring structure and reliability to learned behavior. Lately I have also been drawn to multimodal learning as a way to give robots richer, more complete pictures of their surroundings.<br><br>Outside of research, I enjoy volleyball, Flamenco guitar, boxing, and the occasional run."
          imageUrl: "avatar.jpg"
          imageWidth: 200
          imageHeight: 200
          buttons:
            - name: Papers
              url: papers/
            - name: Blog
              url: blog/
            - name: CV
              url: cv/
            - name: Misc
              url: misc/

